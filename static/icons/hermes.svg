<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Caduceus: central rod, two snakes, wings on top -->

  <!-- Wings (top) -->
  <rect x="0" y="1" width="2" height="1" fill="#f0a500"/>
  <rect x="1" y="2" width="2" height="1" fill="#f0a500"/>
  <rect x="2" y="3" width="3" height="1" fill="#f0a500"/>
  <rect x="13" y="1" width="2" height="1" fill="#f0a500"/>
  <rect x="12" y="2" width="2" height="1" fill="#f0a500"/>
  <rect x="10" y="3" width="3" height="1" fill="#f0a500"/>

  <!-- Central rod -->
  <rect x="7" y="1" width="2" height="14" fill="#f0a500"/>

  <!-- Snake left: winds around rod -->
  <rect x="5" y="3" width="2" height="1" fill="#f0a500"/>
  <rect x="4" y="4" width="3" height="1" fill="#f0a500"/>
  <rect x="5" y="5" width="2" height="1" fill="#f0a500"/>
  <rect x="6" y="6" width="1" height="1" fill="#f0a500"/>
  <rect x="5" y="7" width="2" height="1" fill="#f0a500"/>
  <rect x="4" y="8" width="3" height="1" fill="#f0a500"/>
  <rect x="5" y="9" width="2" height="1" fill="#f0a500"/>
  <rect x="6" y="10" width="1" height="1" fill="#f0a500"/>
  <rect x="5" y="11" width="2" height="1" fill="#f0a500"/>

  <!-- Snake right: mirror -->
  <rect x="9" y="3" width="2" height="1" fill="#f0a500"/>
  <rect x="9" y="4" width="3" height="1" fill="#f0a500"/>
  <rect x="9" y="5" width="2" height="1" fill="#f0a500"/>
  <rect x="9" y="6" width="1" height="1" fill="#f0a500"/>
  <rect x="9" y="7" width="2" height="1" fill="#f0a500"/>
  <rect x="9" y="8" width="3" height="1" fill="#f0a500"/>
  <rect x="9" y="9" width="2" height="1" fill="#f0a500"/>
  <rect x="9" y="10" width="1" height="1" fill="#f0a500"/>
  <rect x="9" y="11" width="2" height="1" fill="#f0a500"/>
</svg>
